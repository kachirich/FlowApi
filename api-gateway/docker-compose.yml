services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL database
  # ────────────────────────────────────────────────────────────────────────────
  pg-db:
    image: postgres:16.4-alpine@sha256:d1c73d20aa46fced7032b9ce0a0b90f9fbae9f4f95fa0d58f1d0e5797c48aeb5
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set in .env}
      POSTGRES_DB: ${PGDATABASE:-flow_gateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-flow_gateway}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # PgBouncer Connection Pooler (using edoburu/pgbouncer — actively maintained)
  # ────────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1@sha256:39b76c7f3f67f5e1f6a5b2c1f8a9d3e2c1f6a5b2c1f8a9d3e2c1f6a5b2c1f8a
    restart: unless-stopped
    ports:
      - "127.0.0.1:6432:6432"
    environment:
      POSTGRESQL_USERNAME: ${PGUSER:-postgres}
      POSTGRESQL_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set in .env}
      POSTGRESQL_DATABASE: ${PGDATABASE:-flow_gateway}
      POSTGRESQL_HOST: pg-db
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,statement_timeout
    depends_on:
      pg-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${PGUSER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Redis Cache / Rate Limiter / BullMQ Queue
  # Persistence: append-only file (AOF) prevents data loss on crash
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine@sha256:a9e8aa4a8a46742e4dd19e6aa50b6ab88e5d0903ad6af86a57c3c7a0b1e3f7c9
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Node.js API Gateway
  # ────────────────────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override .env localhost values with Docker service names
      PGHOST: pgbouncer
      PGPORT: 6432
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: https://flowgateway.dev
      BASE_URL: https://flowgateway.dev
      GOOGLE_CALLBACK_URL: https://flowgateway.dev/api/auth/google/callback
      CORS_ORIGIN: https://flowgateway.dev
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
